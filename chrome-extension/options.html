<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>配置 yter 下载</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="card">
    <div class="heading">
      <img src="icons/icon48.png" width="48" height="48" alt="">
      <div>
        <h1>使用 yter 下载</h1>
        <p>右键点击页面链接，选择下载视频或下载音频。</p>
      </div>
    </div>

    <form id="settings-form">
      <label for="server-url">yter 服务地址</label>
      <input
        id="server-url"
        name="server-url"
        type="url"
        inputmode="url"
        placeholder="https://yter.cellmean.com"
        required
      >
      <p class="help">只支持 http 或 https。自定义地址需要在保存时授予该站点访问权限。</p>
      <button type="submit">保存设置</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>
  <script src="options.js"></script>
</body>
</html>
